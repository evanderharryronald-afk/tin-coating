# ── 主表配置 ────────────────────────────────────────────────────
master:
  filename: "ProdcoilDataSReport.xlsx"
  search_root: 'data\ETL1 Data\ETL1 25.6-26.6'
  search_pattern: '*/ProdcoilDataSReport.xlsx'   # * 匹配一级子目录，** 匹配任意深度

  # 主表表头行范围和数据起始行（行号从 1 开始计数）
  header_row_start: 11
  header_row_end: 14
  data_start_row: 15

  # 需要保留的列，用 Excel 列字母表示（不区分大小写）。
  keep_columns:
    - "E"    # Coil ID
    - "F"    # Steel Grade
    - "H"    # Produce Time
    - "P"    # Dimension_[mm]_Thickness
    - "Q"    # Dimension_[mm]_Width
    - "S"    # Dimension_[mm]_Length
    - "AL"   # Process_Avg
    - "KN"   # GL_1_Avg
    - "KS"   # GL_2_Avg
    - "KW"   # GL_3_Avg
    - "LA"   # GL_4_Avg
