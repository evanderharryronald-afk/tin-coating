# ── 副表配置（列表，支持多副表，按顺序依次合并）──────────────────
sub_tables:

  - path: 'data\Analysis Center Data\25.6-26.6分析中心检测值.csv'    # 副表文件路径

    # 关键字段配置
    join_key:
      master_col: "E"           # 主表关键字段的列字母（对应 Coil ID）
      sub_col:    "出口材料号(XA1)"      # 副表关键字段的列名（第一行表头中的名称）
      unmatched:  "drop"        # 主表行在副表无匹配时的处理：drop=删除该行；keep=保留填空值（默认）
      all_null:   "drop"        # 匹配到但副表保留列全为空时的处理：drop=删除；keep=保留（默认）

    # 副表需要保留的列及其合并策略
    # 策略说明：
    #   first_nonempty  取有值的第一行（过滤空值后取第一条）【默认：文本列】
    #   first           直接取第一行（不过滤空值）
    #   mean            均值，忽略空值【默认：数值列】
    #   sum             求和，忽略空值
    #   max             最大值，忽略空值
    #   min             最小值，忽略空值
    #   join_unique     去重后用逗号拼接（适合文本列）
    keep_columns:
      - col: "上表面镀层重量A(XA1_0)"       # 副表列名（与表头完全一致）
        strategy: mean
      - col: "上表面镀层重量C(XA1_0)"
        strategy: mean
      - col: "上表面镀层重量D(XA1_0)"
        strategy: mean
      - col: "上表面镀层重量W(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量A(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量C(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量D(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量W(XA1_0)"
        strategy: mean
      # 在此继续添加...

# ── 输出配置 ────────────────────────────────────────────────────
output:
  path: 'result/merged_result.xlsx'    # 输出文件路径
  sheet_name: "Result"          # 输出 Sheet 名称
