    - "SP"   # Tin Weight_Actual[g/m2]_GALV_WEIGHT_BOT_Min

# ── 副表配置（列表，支持多副表，按顺序依次合并）──────────────────
sub_tables:

  - path: 'data\Analysis Center Data\25.6-26.6分析中心检测值.csv'    # 副表文件路径

    # 关键字段配置
    join_key:
      master_col: "E"           # 主表关键字段的列字母（对应 Coil ID）
      sub_col:    "出口材料号(XA1)"      # 副表关键字段的列名
      unmatched:  "drop"        # 主表行在副表无匹配时的处理：drop=删除该行；keep=保留填空值（默认）
      all_null:   "drop"        # 匹配到但副表保留列全为空时的处理：drop=删除；keep=保留（默认）

      # 【新增字段】特定列为空剔除行逻辑。
      # 列表中指定的副表列，只要有任意一列在聚合后为空值(None/NaN)，就自动剔除整行。
      required_columns:
        - "上表面镀层重量A(XA1_0)"  # Average 均值
#        - "上表面镀层重量C(XA1_0)" # Center 中心侧
#        - "上表面镀层重量D(XA1_0)" # Drive 驱动侧
#        - "上表面镀层重量W(XA1_0)" # Work 操作侧
#        - "下表面镀层重量A(XA1_0)"
#        - "下表面镀层重量C(XA1_0)"
#        - "下表面镀层重量D(XA1_0)"
#        - "下表面镀层重量W(XA1_0)"

    # 副表需要保留的列及其合并策略
    keep_columns:
      - col: "上表面镀层重量A(XA1_0)"
        strategy: mean
      - col: "上表面镀层重量C(XA1_0)"
        strategy: mean
      - col: "上表面镀层重量D(XA1_0)"
        strategy: mean
      - col: "上表面镀层重量W(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量A(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量C(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量D(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量W(XA1_0)"
        strategy: mean
      - col: "上表面镀层标准重量(XA1_0)"
        strategy: mean
      - col: "上表面镀层重量_最大(XA1_0)"
        strategy: mean
      - col: "上表面镀层重量_最小(XA1_0)"
        strategy: mean
      - col: "下表面镀层标准重量(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量_最大(XA1_0)"
        strategy: mean
      - col: "下表面镀层重量_最小(XA1_0)"
        strategy: mean

# ── 输出配置 ────────────────────────────────────────────────────
output:
  path: 'result/merged_data/merged_result_latest.xlsx'    # 输出文件路径
  sheet_name: "Result"          # 输出 Sheet 名称