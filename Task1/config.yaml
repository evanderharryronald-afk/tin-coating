    - "LI"   # GL_6_Avg
    - "LM"   # GL_7_Avg
    - "LQ"   # GL_8_Avg
    - "LU"   # GL_9_Avg
    - "LY"   # GL_10_Avg
    - "MC"   # GL_11_Avg
    - "MG"   # GL_12_Avg
    - "MK"   # GL_13_Avg
