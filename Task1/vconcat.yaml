# ═══════════════════════════════════════════════════════════════
#  vconcat.yaml
#  配置要拼接的文件，然后运行 python vconcat.py
# ═══════════════════════════════════════════════════════════════

# ── 输入文件列表 ────────────────────────────────────────────────
# 每一项可以是：
#   - 单个文件路径（xlsx / xls / csv）
#   - 一个目录路径（自动收集其下所有 xlsx/csv，按文件名排序）
inputs:
  - 'result\merged_result_normal.xlsx'   # 正常格式主表跑出来的结果
  - 'result\merged_result_special.xlsx'  # 特殊格式主表单独跑出来的结果
  # - 'result\'                          # 也可以直接指定目录，自动收集

# ── 列名不一致时的处理方式 ──────────────────────────────────────
# error : 报错终止（默认，推荐，防止静默拼出脏数据）
# warn  : 打印警告但继续，列不对齐处填 NaN
# ignore: 静默继续
on_column_mismatch: 'error'

# ── 输出配置 ────────────────────────────────────────────────────
output:
  path: 'result\vconcat_result.xlsx'
  sheet_name: 'Result'
